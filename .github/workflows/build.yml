name: Build Android AAB

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK 35
      run: |
        sdkmanager "platforms;android-35" "build-tools;35.0.0"

    - name: Create Android Project
      run: |
        mkdir -p project/app/src/main/assets
        mkdir -p project/app/src/main/java/com/mafia/oyun
        mkdir -p project/app/src/main/res/values
        cp index.html project/app/src/main/assets/

        cat > project/gradle.properties << 'EOF'
        android.useAndroidX=true
        android.enableJetifier=true
        EOF

        cat > project/settings.gradle << 'EOF'
        rootProject.name = "MafiaOyunu"
        include ':app'
        EOF

        cat > project/build.gradle << 'EOF'
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.0'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF

        cat > project/app/build.gradle << 'EOF'
        apply plugin: 'com.android.application'
        android {
            compileSdkVersion 35
            namespace 'com.mafia.oyun'
            defaultConfig {
                applicationId 'com.mafia.oyun'
                minSdkVersion 24
                targetSdkVersion 35
                versionCode 1
                versionName '1.0'
            }
            signingConfigs {
                release {
                    storeFile file('keystore.jks')
                    storePassword System.getenv('STORE_PASSWORD')
                    keyAlias System.getenv('KEY_ALIAS')
                    keyPassword System.getenv('KEY_PASSWORD')
                }
            }
            buildTypes {
                release {
                    minifyEnabled false
                    signingConfig signingConfigs.release
                }
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

        cat > project/app/src/main/java/com/mafia/oyun/MainActivity.java << 'EOF'
        package com.mafia.oyun;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebSettings;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView w = new WebView(this);
                w.getSettings().setJavaScriptEnabled(true);
                w.getSettings().setDomStorageEnabled(true);
                w.loadUrl("file:///android_asset/index.html");
                setContentView(w);
            }
        }
        EOF

        cat > project/app/src/main/res/values/strings.xml << 'EOF'
        <resources><string name="app_name">Mafia Oyunu</string></resources>
        EOF

        cat > project/app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:label="@string/app_name"
                android:theme="@style/Theme.AppCompat.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        keytool -genkey -v \
          -keystore project/app/keystore.jks \
          -alias $KEY_ALIAS \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass $STORE_PASSWORD \
          -keypass $KEY_PASSWORD \
          -dname "CN=Mafia Oyunu, OU=Games, O=Baku, L=Baku, S=Baku, C=AZ"

        cd project
        wget -q https://services.gradle.org/distributions/gradle-8.1-bin.zip
        unzip -q gradle-8.1-bin.zip
        ./gradle-8.1/bin/gradle wrapper --gradle-version=8.1
        JAVA_HOME=$JAVA_HOME ./gradlew bundleRelease

      env:
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: mafia-aab
        path: project/app/build/outputs/bundle/release/app-release.aab
