name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Create Android Project
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/mafia/oyun
        mkdir -p app/src/main/res/values
        mkdir -p gradle/wrapper
        cp index.html app/src/main/assets/

        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "MafiaOyunu"
        include(":app")
        EOF

        cat > build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application") version "8.2.0" apply false
        }
        EOF

        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
        }
        android {
            compileSdk = 34
            namespace = "com.mafia.oyun"
            defaultConfig {
                applicationId = "com.mafia.oyun"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
        }
        dependencies {
            implementation("androidx.appcompat:appcompat:1.6.1")
        }
        EOF

        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

        cat > app/src/main/java/com/mafia/oyun/MainActivity.java << 'EOF'
        package com.mafia.oyun;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebSettings;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                WebSettings s = webView.getSettings();
                s.setJavaScriptEnabled(true);
                s.setDomStorageEnabled(true);
                webView.loadUrl("file:///android_asset/index.html");
                setContentView(webView);
            }
        }
        EOF

        cat > app/src/main/res/values/strings.xml << 'EOF'
        <resources><string name="app_name">Mafia Oyunu</string></resources>
        EOF

        cat > app/src/main/AndroidManifest.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <application
                android:label="@string/app_name"
                android:theme="@style/Theme.AppCompat.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

    - name: Build APK
      run: |
        gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: mafia-apk
        path: app/build/outputs/apk/debug/app-debug.apk
